name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  security_scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (frontend production)
        run: |
          echo "=== Frontend Production Dependencies ==="
          npm audit --omit=dev --audit-level=critical
        continue-on-error: true

      - name: Install Functions dependencies
        run: |
          cd functions
          npm ci

      - name: Run npm audit (functions)
        run: |
          echo "=== Cloud Functions Dependencies ==="
          cd functions
          npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for critical vulnerabilities
        run: |
          echo "📊 Pre-Deployment Security Check"
          echo "Frontend production:"
          npm audit --omit=dev --json | jq '.metadata.vulnerabilities' || true
          echo "Functions:"
          cd functions && npm audit --json | jq '.metadata.vulnerabilities' || true
          echo "ℹ️ Deployment will proceed - full audit runs weekly"

  build_and_deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: security_scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          CI: false

      - name: Deploy to Firebase
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}" --project xsavlab
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}


