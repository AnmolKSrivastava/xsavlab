name: Security Audit

on:
  schedule:
    # Run security audit every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual triggering
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'functions/package.json'
      - 'functions/package-lock.json'

jobs:
  security-audit:
    name: NPM Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend security audit
        run: |
          echo "=== Frontend Security Audit ==="
          npm audit --audit-level=moderate || echo "⚠️ Vulnerabilities found in frontend"
          
      - name: Generate frontend audit report
        run: |
          npm audit --json > frontend-audit.json || true
          echo "Frontend Audit Summary:"
          cat frontend-audit.json | jq '.metadata.vulnerabilities'

      - name: Install functions dependencies
        run: |
          cd functions
          npm ci

      - name: Run functions security audit
        run: |
          echo "=== Cloud Functions Security Audit ==="
          cd functions
          npm audit --audit-level=moderate || echo "⚠️ Vulnerabilities found in functions"

      - name: Generate functions audit report
        run: |
          cd functions
          npm audit --json > functions-audit.json || true
          echo "Functions Audit Summary:"
          cat functions/functions-audit.json | jq '.metadata.vulnerabilities'

      - name: Check for critical vulnerabilities
        run: |
          FRONTEND_CRITICAL=$(cat frontend-audit.json | jq '.metadata.vulnerabilities.critical // 0')
          FRONTEND_HIGH=$(cat frontend-audit.json | jq '.metadata.vulnerabilities.high // 0')
          FUNCTIONS_CRITICAL=$(cat functions/functions-audit.json | jq '.metadata.vulnerabilities.critical // 0')
          FUNCTIONS_HIGH=$(cat functions/functions-audit.json | jq '.metadata.vulnerabilities.high // 0')
          
          echo "Frontend - Critical: $FRONTEND_CRITICAL, High: $FRONTEND_HIGH"
          echo "Functions - Critical: $FUNCTIONS_CRITICAL, High: $FUNCTIONS_HIGH"
          
          TOTAL_CRITICAL=$((FRONTEND_CRITICAL + FUNCTIONS_CRITICAL))
          TOTAL_HIGH=$((FRONTEND_HIGH + FUNCTIONS_HIGH))
          
          if [ "$TOTAL_CRITICAL" -gt 0 ]; then
            echo "❌ CRITICAL vulnerabilities found! Please fix immediately."
            exit 1
          elif [ "$TOTAL_HIGH" -gt 0 ]; then
            echo "⚠️ HIGH severity vulnerabilities found. Please review and fix."
            exit 1
          else
            echo "✅ No critical or high severity vulnerabilities found."
          fi

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-reports
          path: |
            frontend-audit.json
            functions/functions-audit.json
          retention-days: 30

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-3.0, AGPL-3.0

  outdated-dependencies:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Check outdated frontend packages
        run: |
          echo "=== Outdated Frontend Packages ==="
          npm outdated || true

      - name: Check outdated functions packages
        run: |
          echo "=== Outdated Functions Packages ==="
          cd functions
          npm outdated || true
